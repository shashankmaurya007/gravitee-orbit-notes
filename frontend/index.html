<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit Notes</title>
  <script>
    // Dynamic API base — works at / (local) and /playground (EC2)
    window.API_BASE = window.location.pathname.startsWith('/playground') ? '/playground' : '';
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              orange:  '#ff8a00',
              orange2: '#fe6e00',
              blue:    '#0084cc',
              blue2:   '#005986',
              dark:    '#1a1f2e',
            }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .ring-brand { --tw-ring-color: #ff8a00; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen" x-data="app()" x-init="init()">

  <!-- Header -->
  <header class="bg-brand-dark border-b border-white/10 px-6 py-3.5 flex items-center justify-between sticky top-0 z-30 shadow-md">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-brand-orange flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-bold leading-none text-white tracking-wide">Orbit Notes</h1>
        <p class="text-xs text-white/40 mt-0.5">Weekly HubSpot note generator</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <!-- Week selector -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-white/50 hidden sm:block">Week</label>
        <select x-model.number="weekOffset"
                class="text-sm border border-white/20 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white/10 text-white">
          <option value="0" class="text-gray-900 bg-white">Last week</option>
          <option value="1" class="text-gray-900 bg-white">2 weeks ago</option>
          <option value="2" class="text-gray-900 bg-white">3 weeks ago</option>
        </select>
      </div>

      <button @click="runSync()" :disabled="syncing"
              class="flex items-center gap-2 bg-brand-orange hover:bg-brand-orange2 disabled:opacity-50 text-white text-sm font-semibold px-4 py-2 rounded-lg transition shadow-sm">
        <svg x-show="!syncing" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <svg x-show="syncing" class="w-4 h-4 animate-spin flex-shrink-0" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <span x-text="syncing ? 'Generating…' : 'Generate Notes'"></span>
      </button>

      <button @click="loadNotes()" title="Refresh"
              class="p-2 text-white/50 hover:text-white hover:bg-white/10 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Cached data banner -->
  <div x-show="isFallback && !statusMsg" x-cloak x-transition
       class="bg-amber-50 border-b border-amber-200 px-6 py-2.5 text-sm text-amber-800 flex items-center gap-2">
    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
    </svg>
    <span>No data for the selected week — showing last synced: <strong x-text="fallbackLabel"></strong></span>
  </div>

  <!-- Status bar -->
  <div x-show="statusMsg" x-cloak x-transition
       class="bg-brand-dark/5 border-b border-brand-orange/20 px-6 py-2.5 text-sm text-brand-dark flex items-center gap-2">
    <svg class="w-4 h-4 animate-spin flex-shrink-0 text-brand-orange" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
    <span x-text="statusMsg"></span>
  </div>

  <!-- Bulk action bar -->
  <div x-show="selectedIds.length > 0" x-cloak x-transition
       class="bg-brand-dark text-white px-6 py-3 flex items-center justify-between">
    <span class="text-sm font-medium" x-text="`${selectedIds.length} note${selectedIds.length > 1 ? 's' : ''} selected`"></span>
    <div class="flex items-center gap-3">
      <button @click="selectedIds = []" class="text-sm text-white/50 hover:text-white transition">
        Clear selection
      </button>
      <button @click="pushSelected()" :disabled="pushing"
              class="flex items-center gap-2 bg-brand-orange hover:bg-brand-orange2 disabled:opacity-50 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        <span x-text="pushing ? 'Pushing…' : 'Push to HubSpot'"></span>
      </button>
    </div>
  </div>

  <!-- Search + Filter bar -->
  <div class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3">
    <div class="max-w-5xl mx-auto flex flex-wrap items-center gap-2">

      <!-- Search -->
      <div class="relative flex-1 min-w-48">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        <input x-model="search" type="text" placeholder="Search customers…"
               class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white" />
      </div>

      <!-- CSM filter -->
      <select x-model="filterCsm"
              class="text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white min-w-36 transition"
              :class="filterCsm ? 'border-brand-orange text-brand-dark font-medium' : 'border-gray-300 text-gray-600'">
        <option value="">All CSMs</option>
        <template x-for="v in filters.csm" :key="v">
          <option :value="v" x-text="v"></option>
        </template>
      </select>

      <!-- AE filter -->
      <select x-model="filterAe"
              class="text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white min-w-36 transition"
              :class="filterAe ? 'border-brand-orange text-brand-dark font-medium' : 'border-gray-300 text-gray-600'">
        <option value="">All AEs</option>
        <template x-for="v in filters.ae" :key="v">
          <option :value="v" x-text="v"></option>
        </template>
      </select>

      <!-- Pod filter -->
      <select x-model="filterPod"
              class="text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white min-w-32 transition"
              :class="filterPod ? 'border-brand-orange text-brand-dark font-medium' : 'border-gray-300 text-gray-600'">
        <option value="">All Pods</option>
        <template x-for="v in filters.pod" :key="v">
          <option :value="v" x-text="v"></option>
        </template>
      </select>

      <!-- TAM filter -->
      <select x-model="filterTam"
              class="text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-orange bg-white min-w-36 transition"
              :class="filterTam ? 'border-brand-orange text-brand-dark font-medium' : 'border-gray-300 text-gray-600'">
        <option value="">All TAMs</option>
        <template x-for="v in filters.tam" :key="v">
          <option :value="v" x-text="v"></option>
        </template>
      </select>

      <!-- Clear filters -->
      <button x-show="search || filterCsm || filterAe || filterPod || filterTam" x-cloak
              @click="search=''; filterCsm=''; filterAe=''; filterPod=''; filterTam='';"
              class="text-xs text-gray-500 hover:text-brand-dark px-2 py-1.5 rounded hover:bg-gray-100 transition whitespace-nowrap">
        Clear filters
      </button>
    </div>
  </div>

  <!-- Main content -->
  <main class="px-4 sm:px-6 py-6 max-w-5xl mx-auto">

    <!-- Summary row -->
    <div x-show="filteredNotes.length > 0" x-cloak class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-4 text-sm text-gray-500">
        <span><span class="font-semibold text-gray-800" x-text="filteredNotes.length"></span>
          <span x-text="(search||filterCsm||filterAe||filterPod||filterTam) ? ` of ${notes.length} notes` : ' notes'"></span></span>
        <span x-show="draftCount > 0"><span class="font-semibold text-yellow-700" x-text="draftCount"></span> draft</span>
        <span x-show="pushedCount > 0"><span class="font-semibold text-green-700" x-text="pushedCount"></span> pushed</span>
        <span x-show="failedCount > 0"><span class="font-semibold text-red-600" x-text="failedCount"></span> failed</span>
      </div>
      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
        <input type="checkbox" @change="toggleAll($event)"
               class="rounded border-gray-300 text-brand-orange focus:ring-brand-orange" />
        Select all drafts
      </label>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && notes.length === 0" x-cloak class="text-center py-24 text-gray-400">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-brand-dark/5 flex items-center justify-center">
        <svg class="w-8 h-8 text-brand-orange/40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <p class="font-medium text-gray-500">No notes yet</p>
      <p class="text-sm mt-1">Click <strong>Generate Notes</strong> to pull this week's Orbit activity.</p>
    </div>

    <!-- No filter results -->
    <div x-show="!loading && notes.length > 0 && filteredNotes.length === 0" x-cloak
         class="text-center py-16 text-gray-400">
      <p class="font-medium text-gray-500">No notes match your filters</p>
      <button @click="search=''; filterCsm=''; filterAe=''; filterPod=''; filterTam='';"
              class="text-sm text-brand-blue hover:text-brand-blue2 mt-2">Clear filters</button>
    </div>

    <!-- Loading -->
    <div x-show="loading" x-cloak class="text-center py-24 text-gray-400 text-sm">Loading…</div>

    <!-- Cards -->
    <div x-show="filteredNotes.length > 0" x-cloak class="space-y-3">
      <template x-for="note in filteredNotes" :key="note.id">
        <div class="bg-white rounded-xl border shadow-sm transition"
             :class="selectedIds.includes(note.id) ? 'border-brand-orange ring-1 ring-brand-orange/30' : 'border-gray-200'">

          <!-- Card header (always visible) -->
          <div class="flex items-center gap-3 px-4 py-3">

            <!-- Checkbox -->
            <input type="checkbox"
                   :checked="selectedIds.includes(note.id)"
                   :disabled="note.status === 'pushed'"
                   @change="toggleSelect(note.id)"
                   class="rounded border-gray-300 text-brand-orange focus:ring-brand-orange disabled:opacity-30 flex-shrink-0 w-4 h-4" />

            <!-- Company + meta -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-gray-900 truncate" x-text="note.company_name"></span>

                <!-- Status badge -->
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium flex-shrink-0"
                      :class="{
                        'bg-yellow-100 text-yellow-800': note.status === 'draft',
                        'bg-green-100 text-green-800':  note.status === 'pushed',
                        'bg-red-100 text-red-700':      note.status === 'failed'
                      }">
                  <template x-if="note.status === 'failed'">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
                    </svg>
                  </template>
                  <span x-text="note.status === 'pushed' ? 'Pushed ✓' : note.status === 'failed' ? 'Failed' : 'Draft'"></span>
                </span>

                <!-- Error icon -->
                <template x-if="note.error_message">
                  <span class="inline-flex items-center gap-1 text-xs text-red-600" :title="note.error_message">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
                    </svg>
                    Error
                  </span>
                </template>
              </div>
              <div class="flex items-center gap-3 mt-0.5 flex-wrap">
                <p class="text-xs text-gray-400" x-text="formatWeek(note.week_start, note.week_end)"></p>
                <template x-if="note.csm">
                  <span class="text-xs text-gray-500"><span class="text-gray-400">CSM</span> <span x-text="note.csm"></span></span>
                </template>
                <template x-if="note.ae_name">
                  <span class="text-xs text-gray-500"><span class="text-gray-400">AE</span> <span x-text="note.ae_name"></span></span>
                </template>
                <template x-if="note.pod">
                  <span class="text-xs text-gray-500"><span class="text-gray-400">Pod</span> <span x-text="note.pod"></span></span>
                </template>
                <template x-if="note.tam">
                  <span class="text-xs text-gray-500"><span class="text-gray-400">TAM</span> <span x-text="note.tam"></span></span>
                </template>
              </div>
            </div>

            <!-- Action buttons -->
            <div class="flex items-center gap-2 flex-shrink-0">

              <!-- Preview button -->
              <button @click="openPreview(note)"
                      class="inline-flex items-center gap-1.5 text-sm font-medium text-brand-blue hover:text-brand-blue2 hover:bg-blue-50 px-3 py-2 rounded-lg transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <span class="hidden sm:inline">Preview</span>
              </button>

              <!-- Push button (draft/failed only) -->
              <template x-if="note.status !== 'pushed'">
                <button @click="pushSingle(note)"
                        class="inline-flex items-center gap-1.5 text-sm font-medium text-white bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg transition shadow-sm">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                  </svg>
                  <span class="hidden sm:inline">Push</span>
                </button>
              </template>

              <!-- Delete button -->
              <button @click="deleteNote(note.id)"
                      class="inline-flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 w-9 h-9 rounded-lg transition"
                      title="Delete note">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>

              <!-- Expand toggle -->
              <button @click="note._open = !note._open"
                      :title="note._open ? 'Collapse' : 'Expand'"
                      class="inline-flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-100 w-9 h-9 rounded-lg transition">
                <svg class="w-4 h-4 transition-transform duration-200" :class="note._open ? 'rotate-180' : ''"
                     fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Expanded detail -->
          <div x-show="note._open" x-cloak x-transition
               class="border-t border-gray-100 px-4 pb-4 pt-3 grid grid-cols-1 sm:grid-cols-3 gap-4">

            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Onboarding</p>
              <p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed"
                 x-text="note.onboarding_summary || 'No onboarding activity this week.'"></p>
            </div>

            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Production</p>
              <p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed"
                 x-text="note.production_summary || 'No production activity this week.'"></p>
            </div>

            <div>
              <p class="text-xs font-semibold uppercase tracking-wide mb-1.5" style="color:#ff8a00">Risks / Blockers</p>
              <p class="text-sm whitespace-pre-line leading-relaxed"
                 :class="note.risks_blockers ? 'text-orange-700' : 'text-gray-400'"
                 x-text="note.risks_blockers || 'None identified.'"></p>

              <!-- Inline error message -->
              <template x-if="note.error_message">
                <div class="mt-3 flex items-start gap-2 bg-red-50 border border-red-200 rounded-lg px-3 py-2.5">
                  <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
                  </svg>
                  <p class="text-xs text-red-700 leading-relaxed" x-text="note.error_message"></p>
                </div>
              </template>
            </div>
          </div>

        </div>
      </template>
    </div>
  </main>

  <!-- Preview Modal -->
  <div x-show="preview.open" x-cloak x-transition
       class="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4">
    <div @click.outside="preview.open = false"
         class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[92vh] flex flex-col">

      <!-- Modal header -->
      <div class="flex items-start justify-between px-6 py-4 border-b border-gray-200">
        <div>
          <h2 class="font-semibold text-base" x-text="preview.note?.company_name"></h2>
          <p class="text-xs text-gray-400 mt-0.5" x-text="preview.note ? formatWeek(preview.note.week_start, preview.note.week_end) : ''"></p>

          <!-- Error banner in modal -->
          <template x-if="preview.note?.error_message">
            <div class="mt-2 flex items-start gap-2 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
              <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
              </svg>
              <p class="text-xs text-red-700" x-text="preview.note.error_message"></p>
            </div>
          </template>
        </div>
        <button @click="preview.open = false"
                class="text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg p-1.5 transition ml-4 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Note body editor -->
      <div class="flex-1 overflow-y-auto px-6 py-4">
        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2 block">Note body</label>
        <textarea x-model="preview.body"
                  :disabled="preview.note?.status === 'pushed'"
                  class="w-full text-sm font-mono border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-brand-orange resize-none disabled:bg-gray-50 disabled:text-gray-400 leading-relaxed"
                  rows="18"></textarea>
        <p x-show="preview.note?.status === 'pushed'"
           class="text-xs text-gray-400 mt-1.5">Already pushed — cannot be edited.</p>
      </div>

      <!-- Modal footer -->
      <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-end gap-3">
        <button @click="preview.open = false"
                class="text-sm text-gray-600 hover:text-gray-900 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
          Cancel
        </button>
        <template x-if="preview.note?.status !== 'pushed'">
          <button @click="saveEdit()"
                  class="text-sm bg-brand-dark hover:bg-black text-white px-4 py-2 rounded-lg transition">
            Save edits
          </button>
        </template>
        <template x-if="preview.note?.status !== 'pushed'">
          <button @click="pushFromPreview()"
                  class="flex items-center gap-2 text-sm bg-green-600 hover:bg-green-700 text-white font-medium px-5 py-2 rounded-lg transition shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            Push to HubSpot
          </button>
        </template>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast.visible" x-cloak x-transition
       :class="toast.type === 'error' ? 'bg-red-600' : 'bg-brand-dark'"
       class="fixed bottom-5 right-5 text-white text-sm px-4 py-3 rounded-xl shadow-xl z-50 max-w-sm flex items-center gap-2">
    <template x-if="toast.type === 'error'">
      <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
      </svg>
    </template>
    <span x-text="toast.message"></span>
  </div>

<script>
const B = window.API_BASE;
function app() {
  return {
    notes: [],
    loading: false,
    syncing: false,
    pushing: false,
    weekOffset: 0,
    selectedIds: [],
    statusMsg: '',
    toast: { visible: false, message: '', type: 'info' },
    preview: { open: false, note: null, body: '' },
    search: '',
    filterCsm: '',
    filterAe: '',
    filterPod: '',
    filterTam: '',
    filters: { csm: [], ae: [], pod: [], tam: [] },

    targetWeekStart(offset) {
      const o = offset !== undefined ? offset : this.weekOffset;
      const today = new Date();
      const daysSinceMonday = (today.getDay() + 6) % 7;
      const d = new Date(today);
      d.setDate(today.getDate() - daysSinceMonday - 7 - o * 7);
      return d.toISOString().split('T')[0];
    },

    get weekNotes() {
      if (!this.notes.length) return [];
      const target = this.targetWeekStart();
      const forWeek = this.notes.filter(n => n.week_start.startsWith(target));
      if (forWeek.length) return forWeek;
      const latest = [...new Set(this.notes.map(n => n.week_start.split('T')[0]))].sort().at(-1);
      return this.notes.filter(n => n.week_start.startsWith(latest));
    },

    get isFallback() {
      if (!this.notes.length) return false;
      return !this.notes.some(n => n.week_start.startsWith(this.targetWeekStart()));
    },

    get fallbackLabel() {
      if (!this.isFallback || !this.weekNotes.length) return '';
      return this.formatWeek(this.weekNotes[0].week_start, this.weekNotes[0].week_end);
    },

    get filteredNotes() {
      const q = this.search.toLowerCase();
      return this.weekNotes.filter(n => {
        if (q && !n.company_name.toLowerCase().includes(q)) return false;
        if (this.filterCsm && n.csm !== this.filterCsm) return false;
        if (this.filterAe  && n.ae_name !== this.filterAe) return false;
        if (this.filterPod && n.pod !== this.filterPod) return false;
        if (this.filterTam && n.tam !== this.filterTam) return false;
        return true;
      });
    },

    get draftCount()  { return this.filteredNotes.filter(n => n.status === 'draft').length; },
    get pushedCount() { return this.filteredNotes.filter(n => n.status === 'pushed').length; },
    get failedCount() { return this.filteredNotes.filter(n => n.status === 'failed').length; },

    async init() {
      await this.loadNotes();
      await this.loadFilters();
    },

    async loadFilters() {
      try {
        const res = await fetch(`${B}/api/notes/filters`);
        if (res.ok) this.filters = await res.json();
      } catch (e) { /* filters optional */ }
    },

    async loadNotes() {
      this.loading = true;
      try {
        const res = await fetch(`${B}/api/notes`);
        const data = await res.json();
        const openIds = new Set(this.notes.filter(n => n._open).map(n => n.id));
        this.notes = data.map(n => ({ ...n, _open: openIds.has(n.id) }));
      } catch (e) {
        this.showToast('Failed to load notes', 'error');
      } finally {
        this.loading = false;
      }
    },

    async runSync() {
      this.syncing = true;
      this.statusMsg = 'Generating notes… This may take 1–2 minutes.';
      try {
        const res = await fetch(`${B}/api/sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ week_offset: this.weekOffset }),
        });
        const data = await res.json();
        this.statusMsg = `Sync running for ${data.week_start} → ${data.week_end}. Refreshing…`;
        const poll = setInterval(async () => {
          await this.loadNotes();
          if (this.notes.length > 0) {
            clearInterval(poll);
            this.statusMsg = '';
            this.showToast(`${this.notes.length} notes ready`);
          }
        }, 5000);
        setTimeout(() => { clearInterval(poll); this.statusMsg = ''; }, 180000);
      } catch (e) {
        this.showToast('Sync failed', 'error');
        this.statusMsg = '';
      } finally {
        this.syncing = false;
      }
    },

    async pushSelected() {
      if (!this.selectedIds.length) return;
      this.pushing = true;
      try {
        const res = await fetch(`${B}/api/notes/push`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note_ids: this.selectedIds }),
        });
        const data = await res.json();
        const pushed = data.results.filter(r => r.status === 'pushed').length;
        const failed = data.results.filter(r => r.status === 'error').length;
        this.showToast(failed ? `Pushed: ${pushed}  Failed: ${failed}` : `${pushed} notes pushed ✓`);
        this.selectedIds = [];
        await this.loadNotes();
      } catch (e) {
        this.showToast('Push failed', 'error');
      } finally {
        this.pushing = false;
      }
    },

    async pushSingle(note) {
      this.pushing = true;
      try {
        const res = await fetch(`${B}/api/notes/push`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note_ids: [note.id] }),
        });
        const data = await res.json();
        const r = data.results[0];
        if (r.status === 'pushed') {
          this.showToast('Pushed to HubSpot ✓');
          this.preview.open = false;
        } else {
          this.showToast(r.message || 'Push failed', 'error');
        }
        await this.loadNotes();
      } catch (e) {
        this.showToast('Push failed', 'error');
      } finally {
        this.pushing = false;
      }
    },

    async pushFromPreview() {
      if (!this.preview.note) return;
      await this.saveEdit();
      await this.pushSingle(this.preview.note);
    },

    async saveEdit() {
      if (!this.preview.note) return;
      try {
        await fetch(`${B}/api/notes/${this.preview.note.id}/body`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note_body: this.preview.body }),
        });
        this.showToast('Saved');
        await this.loadNotes();
      } catch (e) {
        this.showToast('Save failed', 'error');
      }
    },

    async deleteNote(id) {
      if (!confirm('Delete this note?')) return;
      await fetch(`${B}/api/notes/${id}`, { method: 'DELETE' });
      this.selectedIds = this.selectedIds.filter(x => x !== id);
      await this.loadNotes();
    },

    openPreview(note) {
      this.preview.note = note;
      this.preview.body = note.note_body || '';
      this.preview.open = true;
    },

    toggleSelect(id) {
      if (this.selectedIds.includes(id)) {
        this.selectedIds = this.selectedIds.filter(x => x !== id);
      } else {
        this.selectedIds.push(id);
      }
    },

    toggleAll(event) {
      this.selectedIds = event.target.checked
        ? this.notes.filter(n => n.status !== 'pushed').map(n => n.id)
        : [];
    },

    formatWeek(start, end) {
      const fmt = d => new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      return `${fmt(start)} – ${fmt(end)}`;
    },

    showToast(message, type = 'info') {
      this.toast = { visible: true, message, type };
      setTimeout(() => { this.toast.visible = false; }, 4000);
    },
  };
}
</script>
</body>
</html>
